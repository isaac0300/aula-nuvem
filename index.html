<!DOCTYPE html>
<html lang="en">
<head>
    <title>Aula de Nuvem</title>
</head>
<body>
    <h1>Lista de Usuarios</h1>

    <table border="1">
      <thead>
          <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Foto</th>
          </tr>
      </thead>

        <tbody id="tabelaUsuarios"> </tbody>
    </table>

    <script>
        async function carregarUsuarios()
        {
            const resposta = await fetch("/usuarios");
            const usuarios = await resposta.json();

            const tabela = document.getElementById("tabelaUsuarios");
            tabela.innerHTML = "";

            usuarios.forEach(usuario => {
                tabela.innerHTML += `
                <tr>
                    <td>${usuario.id}</td>
                    <td>${usuario.nome}</td>
                    <td>${usuario.email}</td>
                    
                    <td>
                        ${usuario.foto ? `<img src="/upload/${usuario.foto}"
                        width="60">` : "Sem foto"}
                    </td>
                </tr>
                `

        })
        }    
    </script>
    
</body>
</html>
